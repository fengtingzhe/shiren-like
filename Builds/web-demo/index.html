<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>shiren-like Web Demo</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="game-shell" aria-label="shiren-like web demo">
      <canvas id="game-canvas" aria-label="迷宫画面"></canvas>

      <section id="hud" aria-label="游戏状态">
        <div class="status-strip">
          <div class="pill hp-pill" aria-label="HP">
            <span>HP</span>
            <strong id="hp-value">20 / 20</strong>
          </div>
          <div class="pill" aria-label="floor">
            <span id="floor-value">1F</span>
          </div>
          <div class="pill" aria-label="turn">
            <span id="turn-value">Turn 0</span>
          </div>
          <div class="pill potion-pill" aria-label="potion count">
            <span>药</span>
            <strong id="potion-value">0</strong>
          </div>
          <button id="pause-button" class="icon-button" type="button" aria-label="pause">
            <span class="pause-icon"></span>
          </button>
          <button id="console-button" class="console-button" type="button" aria-label="open console" aria-expanded="false">
            <span class="console-icon"></span>
            Console
          </button>
        </div>

        <div id="objective" class="objective"></div>
        <div id="prompt" class="prompt is-hidden"></div>
        <div id="event-log" class="event-log" aria-live="polite"></div>

        <div class="quick-actions" aria-label="quick actions">
          <button id="potion-button" class="action-button" type="button">H 回复药</button>
          <button id="wait-button" class="action-button secondary" type="button">. 等待</button>
          <button id="stairs-button" class="action-button secondary" type="button">E 下楼</button>
        </div>

        <div class="touch-pad" aria-label="direction controls">
          <button class="pad-button pad-up" type="button" data-direction="up" aria-label="move up">↑</button>
          <button class="pad-button pad-left" type="button" data-direction="left" aria-label="move left">←</button>
          <button class="pad-button pad-right" type="button" data-direction="right" aria-label="move right">→</button>
          <button class="pad-button pad-down" type="button" data-direction="down" aria-label="move down">↓</button>
        </div>
      </section>

      <aside id="console-panel" class="console-panel" aria-label="console panel" aria-hidden="true">
        <div class="console-header">
          <h2>Console</h2>
          <button id="console-close-button" class="icon-button" type="button" aria-label="close console">
            <span class="close-icon"></span>
          </button>
        </div>
        <label class="toggle-row">
          <input id="music-toggle" type="checkbox" checked>
          <span>音乐</span>
        </label>
        <label class="toggle-row">
          <input id="sfx-toggle" type="checkbox" checked>
          <span>音效</span>
        </label>
        <label class="toggle-row">
          <input id="fps-toggle" type="checkbox">
          <span>显示 FPS</span>
        </label>
        <button id="console-pause-button" class="console-action" type="button">暂停 / 继续</button>
        <button id="console-reset-button" class="console-action" type="button">重置 Demo</button>
        <div id="fps-readout" class="fps-readout is-hidden">FPS 0</div>
      </aside>

      <section id="start-overlay" class="overlay">
        <div class="modal">
          <h1>shiren-like</h1>
          <p>在三层迷宫中活下来。移动一格就是一回合，怪物会追击，回复药和楼梯是最重要的资源。</p>
          <button id="start-button" class="primary-button" type="button">
            <span class="play-icon"></span>
            开始 Demo
          </button>
          <p class="control-note">WASD / 方向键移动，H 使用回复药，空格或句号等待，站在楼梯上按 E / Enter 下楼。</p>
        </div>
      </section>

      <section id="result-overlay" class="overlay is-hidden">
        <div class="modal">
          <h2 id="result-title">结算</h2>
          <p id="result-copy"></p>
          <dl class="result-stats">
            <div>
              <dt>到达楼层</dt>
              <dd id="result-floor">1F</dd>
            </div>
            <div>
              <dt>击败怪物</dt>
              <dd id="result-kills">0</dd>
            </div>
            <div>
              <dt>使用回复药</dt>
              <dd id="result-potions">0</dd>
            </div>
          </dl>
          <button id="restart-button" class="primary-button" type="button">
            <span class="restart-icon"></span>
            再来一局
          </button>
        </div>
      </section>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
